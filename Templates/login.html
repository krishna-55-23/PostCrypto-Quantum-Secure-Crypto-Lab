<!DOCTYPE html>
<html>
<head>
    <title>PostCrypto Login</title>
    <style>
        body{
            background:#0f172a;
            font-family:Arial;
            color:white;
            text-align:center;
            margin-top:120px;
        }

        form{
            background:#1e293b;
            padding:30px;
            width:300px;
            margin:auto;
            border-radius:10px;
        }

        input{
            width:90%;
            padding:8px;
            margin:10px;
        }

        button{
            padding:8px 20px;
            background:#38bdf8;
            border:none;
            color:black;
        }
    </style>
</head>

<body>

<h2>🔐 PostCrypto Quantum Secure Lab</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit">Login</button>
</form>

</body>
</html>
